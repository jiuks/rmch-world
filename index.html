<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RMCH LTD</title>
<meta name="description" content="RMCH LTD — registered in England &amp; Wales.">
<style>
  :root{ --bg:#f5f6f8; --ink:#1a2230; --muted:#6b7885; --rule:#d7dce2; }
  @media (prefers-color-scheme: dark){ :root{ --bg:#0f1319; --ink:#eef1f5; --muted:#8b97a4; --rule:#2a333f; } }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family: ui-serif, Georgia, "Times New Roman", serif;
    display:grid; place-items:center; text-align:center; padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  main{ max-width:520px; }
  h1{
    margin:0; font-weight:600; letter-spacing:.28em;
    font-size: clamp(1.9rem, 7vw, 3rem); text-indent:.28em;
  }
  .rule{ width:56px; height:1px; background:var(--rule); margin:22px auto; border:0; }
  p{ margin:0; color:var(--muted); letter-spacing:.06em; font-size:.95rem; }
</style>
</head>
<body>
  <main>
    <h1>RMCH&nbsp;LTD</h1>
    <hr class="rule">
    <p>Registered in England &amp; Wales</p>
  </main>
</body>
</html>
